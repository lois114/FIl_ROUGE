global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métriques de l'application AquaLab (endpoint /metrics)
  - job_name: "aqualab-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]

  # Métriques système de la VM
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
