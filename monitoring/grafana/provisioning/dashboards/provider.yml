# Charge automatiquement les dashboards JSON depuis /var/lib/grafana/dashboards
apiVersion: 1

providers:
  - name: AquaLab
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
