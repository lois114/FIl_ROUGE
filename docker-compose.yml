# AquaLab — stack applicative (Axe 6 : déploiement reproductible)
# Démarre : API + PostgreSQL (métier) + MongoDB (logs) + outils d'admin web.
# Lancement : docker compose up -d
services:
  app:
    build: .
    container_name: aqualab-app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=postgres
      - DB_NAME=aqualab
    depends_on:
      - postgres
      - mongo
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: aqualab-postgres
    environment:
      - POSTGRES_DB=aqualab
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ChangeMePg_2026
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./bdd/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./bdd/02_roles_dcl.sql:/docker-entrypoint-initdb.d/02_roles_dcl.sql:ro
      - ./bdd/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: aqualab-mongo
    environment:
      - MONGO_INITDB_DATABASE=aqualab_logs
    volumes:
      - mongo_data:/data/db
      - ./bdd/05_seed_logs.js:/docker-entrypoint-initdb.d/05_seed_logs.js:ro
    restart: unless-stopped

  # --- Outils d'administration web (lab uniquement) ---
  adminer:
    image: adminer:latest
    container_name: aqualab-adminer
    ports:
      - "8083:8080"        # interface web pour PostgreSQL
    depends_on:
      - postgres
    restart: unless-stopped

  # --- Observabilité : Prometheus + Grafana (axe 6) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: aqualab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    depends_on:
      - app
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: aqualab-node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: aqualab-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=ChangeMeGrafana_2026
      # Rendu serveur d'images (export PNG/PDF des dashboards, vignettes d'alertes)
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
      - GF_RENDERING_RENDERER_TOKEN=ChangeMeRender_2026
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - renderer
    restart: unless-stopped

  # Moteur de rendu d'images Grafana (génère les PNG des dashboards)
  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: aqualab-renderer
    environment:
      - AUTH_TOKEN=ChangeMeRender_2026
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  prom_data:
  grafana_data:
