name: CI-CD AquaLab

# Axe 6 : pipeline d'intégration et de déploiement continu avec analyse de sécurité
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1) Qualité + tests unitaires
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: pip install -r app/requirements.txt
      - name: Tests unitaires (pytest)
        run: cd app && pytest -v

  # 2) Détection de secrets dans le dépôt (Gitleaks)
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3) Build de l'image + scan de vulnérabilités (Trivy)
  build-and-scan:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v7
      - name: Build de l'image Docker
        run: docker build -t aqualab-app:${{ github.sha }} .
      - name: Scan de l'image (Trivy via image officielle)
        # Image Docker officielle de Trivy plutôt que l'action du Marketplace :
        # pas de tag d'action mutable a resoudre, et on evite le risque de chaine
        # d'approvisionnement (incident trivy-action de mars 2026).
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
              --exit-code 1 \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              aqualab-app:${{ github.sha }}

  # 4) Déploiement (illustratif — sur la branche main uniquement)
  deploy:
    runs-on: ubuntu-latest
    needs: [ build-and-scan, secrets-scan ]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - name: Déploiement
        run: |
          echo "Connexion au serveur et 'docker compose up -d' via SSH"
          echo "(a brancher sur ton infra : secrets SSH_HOST / SSH_KEY)"
