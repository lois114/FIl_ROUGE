name: CI-CD AquaLab

# Axe 6 : pipeline d'intégration et de déploiement continu avec analyse de sécurité
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1) Qualité + tests unitaires
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installer les dépendances
        run: pip install -r app/requirements.txt
      - name: Tests unitaires (pytest)
        run: pytest -v

  # 2) Détection de secrets dans le dépôt (Gitleaks)
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3) Build de l'image + scan de vulnérabilités (Trivy)
  build-and-scan:
    runs-on: ubuntu-latest
    needs: [ test ]
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image Docker
        run: docker build -t aqualab-app:${{ github.sha }} .
      - name: Scan de l'image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: aqualab-app:${{ github.sha }}
          format: table
          exit-code: "1"            # échoue le pipeline si vulnérabilités HIGH/CRITICAL
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # 4) Déploiement (illustratif — sur la branche main uniquement)
  deploy:
    runs-on: ubuntu-latest
    needs: [ build-and-scan, secrets-scan ]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Déploiement
        run: |
          echo "Connexion au serveur et 'docker compose up -d' via SSH"
          echo "(à brancher sur ton infra : secrets SSH_HOST / SSH_KEY)"
