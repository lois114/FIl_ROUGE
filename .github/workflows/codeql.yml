name: CodeQL (SAST)

# Analyse statique de sécurité du code source (intégrée à GitHub)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 6 * * 1"   # tous les lundis 06h00

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      matrix:
        language: [ python ]
    steps:
      - uses: actions/checkout@v7
      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Analyse CodeQL
        uses: github/codeql-action/analyze@v3
